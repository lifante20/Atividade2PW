<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Atividade Web II</title>
</head>
<body>

<div class="container">
    <h2>Cadastro de Produtos</h2>

    <!--Cira as áreas onde serão deigitados os valores-->
    <input type="text" id="nome" placeholder="Nome do produto">
    <input type="number" id="valor" placeholder="Valor do produto">
    <input type="number" id="quantidade" placeholder="Quantidade">

    <br>

    <!--Cria os botões e define o evento deles quando o usuario clicar-->
    <button onclick="adicionar()">Adicionar</button>
    <button onclick="lista()">Listar Produtos</button>
    <button onclick="resumo()">Resumo</button>
    <button onclick="limparTudo()">Limpar Tudo</button>

    <hr>

    <!--Cria mais um botão para remover por índice-->
    <input type="number" id="indiceRemover" placeholder="Índice para remover">
    <button onclick="removerPorIndice()">Remover por Índice</button>

    <div id="saida"></div>
</div>

<script> //É aqui que começa a parte boa ;)

//Cria uma variavel que vai servir como lista
let produtos = []; 

//Função para adicionar um produto à lista
function adicionar(){ 
    let nome = document.getElementById("nome").value; //cria variaveis para os ids dos inputs lá de cima
    let valor = parseFloat(document.getElementById("valor").value);
    let quantidade = parseInt(document.getElementById("quantidade").value);

    // É isso aqui que coloca os valores na lista
    produtos.push({ 
        nome: nome,
        valor: valor,
        quantidade: quantidade
    });
    }

    // Essa função verifica se tem alguma coisa salva na lista e avisa se não tiver
function lista(){
    if(produtos.length === 0){
        alert("Nenhum produto cadastrado!");
        return;
    }

    // Cria uma variavel para tabela... chamada tabela
    let tabela = "<table>";
    tabela += "<tr><th>Índice</th><th>Nome</th><th>Valor</th><th>Quantidade</th><th>Total</th></tr>";

    for(let i = 1; i < produtos.length; i++){
        let totalProduto = produtos[i].valor * produtos[i].quantidade;

        // Pega os valores ejoga na tabela
        tabela += "<tr>";
        tabela += "<td>" + i + "</td>";
        tabela += "<td>" + produtos[i].nome + "</td>";
        tabela += "<td>" + produtos[i].valor.toFixed(2) + "</td>"; // esse toFixed(2) é para mostrar o valor com 2 casas decimais no máximo (prevenção contra lunaticos)
        tabela += "<td>" + produtos[i].quantidade + "</td>";
        tabela += "<td>R$ " + totalProduto.toFixed(2) + "</td>";
        tabela += "</tr>";
    }

    tabela += "</table>";

    document.getElementById("saida").innerHTML = tabela;
}

//cria a função que vai resumir todos os dados
//começa verificando se existe uma lista
function resumo(){
    if(produtos.length === 0){
        alert("Nenhum produto cadastrado!");
        return;
    }

    //cria duas variaveis, uma para o total da compra e outra para a quantidade total de itens
    let total = 0;
    let totalProd = 0;

    //Vai somando tudo enquanto passa a lista
    for(let i = 1; i < produtos.length; i++){
        total += produtos[i].valor * produtos[i].quantidade;
        totalProd += produtos[i].quantidade;
    }

    //mostra o resultado do que sair em cima
    document.getElementById("saida").innerHTML =
        "<h2>Resumo</h2>" +
        "Quantidade total de itens: " + totalProd + "<br>" +
        "Valor total da compra: R$ " + total.toFixed(2);
}

//Cria uma função para tirar algo da lista de acordo com a posição dele
function removerPorIndice(){
    let indice = parseInt(document.getElementById("indiceRemover").value);

    //Dita as necessidades para poder dar certo
    if(isNaN(indice) || indice < 0 || indice >= produtos.length){
        alert("Índice inválido!");
        return;
    }

    //o .splice é o comando para tirar um item da lista
    produtos.splice(indice, 1);

    //atualiza a lista e limpa o campo de índice
    document.getElementById("indiceRemover").value = "";

    //chama a função que mostra a lista
    lista();
}

//Cria uma função para limpar tudo da lista setando o valor como vazio
function limparTudo(){
    produtos = [];
    document.getElementById("saida").innerHTML = "";
}

</script>

</body>
</html>
